<div class="p-6 text-center w-full flex flex-col items-center">
    <h2 class="text-3xl font-bold text-slate-500 mb-2">Srebrna Nagroda</h2>
    <p class="text-slate-400 mb-8 text-sm">Zakręć kołem, aby wylosować swoją nagrodę!</p>

    <div class="relative w-64 h-64 mb-8">
        <div class="absolute -top-6 left-1/2 transform -translate-x-1/2 text-5xl z-10 text-slate-700 drop-shadow-md">
            ▼
        </div>
        <canvas id="wheel-canvas" class="w-full h-full rounded-full shadow-lg border-4 border-slate-200"></canvas>
    </div>

    <button id="spin-btn" class="bg-slate-500 hover:bg-slate-600 text-white font-bold py-3 px-10 rounded-full transition-all shadow-md text-lg tracking-wider">
        ZAKRĘĆ
    </button>

    <div id="silver-result" class="mt-2 opacity-0 transition-opacity duration-500 hidden flex-col items-center">
        <span class="text-5xl mb-3"></span>
        <h3 id="silver-prize-text" class="text-2xl font-bold text-slate-700 leading-tight">...</h3>
    </div>
</div>
